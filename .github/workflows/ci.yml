name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify-go:
    name: Verify Go
    uses: ./.github/workflows/reusable-go-verify.yml
    with:
      runner: ubuntu-latest

  verify-frontend-vendor:
    name: Verify Frontend Vendor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: modules/frontend/vendor-src/package-lock.json

      - name: Install vendor build dependencies
        working-directory: modules/frontend/vendor-src
        run: npm ci --no-audit --no-fund

      - name: Build vendor bundles
        working-directory: modules/frontend/vendor-src
        run: npm run build

      - name: Check vendor bundle outputs
        working-directory: modules/frontend/vendor-src
        run: npm run check

      - name: Ensure generated vendor assets are committed
        shell: bash
        run: git diff --exit-code -- modules/frontend/html/external/vendor modules/frontend/vendor-src/dist-manifest.json

  smoke-web:
    name: Web Smoke
    runs-on: ubuntu-latest
    needs:
      - verify-go
      - verify-frontend-vendor

    steps:
      - name: Checkout Adalanche
        uses: actions/checkout@v6
        with:
          path: adalanche

      - name: Checkout sample data
        uses: actions/checkout@v6
        with:
          repository: lkarlslund/adalanche-sampledata
          path: adalanche-sampledata

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: adalanche/go.mod

      - name: Run sample data web smoke
        env:
          ADALANCHE_SAMPLEDATA: ${{ github.workspace }}/adalanche-sampledata/goad
        run: |
          cd "${GITHUB_WORKSPACE}/adalanche"
          go test -v ./test/smoke
